<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Payment Page</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

.container{
width:500px;
background:white;
padding:20px;
margin:auto;
margin-top:40px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
color:blue;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:1px solid gray;
border-radius:5px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:green;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:darkgreen;
}

.summary{
margin-top:20px;
padding:15px;
border:1px solid gray;
border-radius:10px;
background:#f9f9f9;
}

p{
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h2>Payment Page</h2>

<div class="summary" id="summary">

</div>

<input
type="text"
id="card_name"
placeholder="Card Holder Name"
>

<input
type="text"
id="card_number"
placeholder="Card Number"
maxlength="16"
>

<input
type="password"
id="cvv"
placeholder="CVV"
maxlength="3"
>

<button onclick="confirmBooking()">

Confirm Booking

</button>

</div>

<script>

const passengerData =
JSON.parse(localStorage.getItem("passengerData"));

const journeyData =
JSON.parse(localStorage.getItem("journeyData"));

document.getElementById("summary").innerHTML = `

<p><b>From:</b> ${journeyData.from_place}</p>

<p><b>To:</b> ${journeyData.to_place}</p>

<p><b>Journey Date:</b> ${journeyData.journey_date}</p>

<p><b>Total Amount:</b> ₹ ${journeyData.total_price}</p>

`;

function confirmBooking(){

const card_name =
document.getElementById("card_name").value;

const card_number =
document.getElementById("card_number").value;

const cvv =
document.getElementById("cvv").value;

if(
card_name=="" ||
card_number=="" ||
cvv==""
){

alert("Please Fill Payment Details");

return;

}

const bookingData = {

username: passengerData.username,

email: passengerData.email,

mobile: passengerData.mobile,

from_place: journeyData.from_place,

to_place: journeyData.to_place,

journey_date: journeyData.journey_date,

bus_type: journeyData.bus_type,

travels_name: journeyData.travels_name,

base_price: journeyData.base_price,

gst: journeyData.gst,

state_tax: journeyData.state_tax,

toll_fee: journeyData.toll_fee,

total_price: journeyData.total_price,

payment_status: "Success",

passengers: journeyData.passengers

};

localStorage.setItem(

"ticketData",

JSON.stringify(bookingData)

);

fetch("http://localhost:5000/book",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(bookingData)

})

.then(response=>response.json())

.then(data=>{

alert(data.message);

window.location.href="ticket.html";

})

.catch(error=>{

alert("Backend Connection Failed");

console.log(error);

})

}

</script>

</body>

</html>
