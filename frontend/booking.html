<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Passenger Details</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

.container{
width:450px;
background:white;
padding:20px;
margin:auto;
margin-top:50px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
color:blue;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:1px solid gray;
border-radius:5px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:blue;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:darkblue;
}

</style>

</head>

<body>

<div class="container">

<h2>Passenger Details</h2>

<input
type="email"
id="email"
placeholder="Enter Email"
>

<input
type="text"
id="mobile"
placeholder="Enter Mobile Number"
>

<button onclick="nextPage()">

Next

</button>

</div>

<script>

function nextPage(){

const email =
document.getElementById("email").value;

const mobile =
document.getElementById("mobile").value;

if(email=="" || mobile==""){

alert("Please Fill All Fields");

return;

}

const username =
localStorage.getItem("username");

localStorage.setItem(

"passengerData",

JSON.stringify({

username:username,

email:email,

mobile:mobile

})

);

window.location.href="journey.html";

}

</script>

</body>

</html>
