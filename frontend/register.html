<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>User Registration</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

.container{
width:450px;
background:white;
padding:20px;
margin:auto;
margin-top:40px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
color:blue;
}

input,select{
width:100%;
padding:12px;
margin-top:12px;
border:1px solid gray;
border-radius:5px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:blue;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:darkblue;
}

</style>

</head>

<body>

<div class="container">

<h2>User Registration</h2>

<input
type="text"
id="full_name"
placeholder="Enter Full Name"
>

<input
type="text"
id="username"
placeholder="Enter Username"
>

<input
type="email"
id="email"
placeholder="Enter Email"
>

<input
type="text"
id="phone"
placeholder="Enter Phone Number"
>

<select id="country">

<option value="">Select Country</option>

<option>India</option>

<option>USA</option>

<option>UK</option>

</select>

<select id="state">

<option value="">Select State</option>

<option>Telangana</option>

<option>Andhra Pradesh</option>

<option>Tamil Nadu</option>

<option>Karnataka</option>

</select>

<input
type="password"
id="password"
placeholder="Enter Password"
>

<button onclick="generateOTP()">

Generate OTP

</button>

</div>

<script>

function generateOTP(){

const full_name =
document.getElementById("full_name").value;

const username =
document.getElementById("username").value;

const email =
document.getElementById("email").value;

const phone =
document.getElementById("phone").value;

const country =
document.getElementById("country").value;

const state =
document.getElementById("state").value;

const password =
document.getElementById("password").value;

if(
full_name=="" ||
username=="" ||
email=="" ||
phone=="" ||
country=="" ||
state=="" ||
password==""
){

alert("Please Fill All Fields");

return;

}

localStorage.setItem(

"registerData",

JSON.stringify({

full_name:full_name,

username:username,

email:email,

phone:phone,

country:country,

state:state,

password:password

})

);

fetch("http://localhost:5000/send-otp",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:email

})

})

.then(response=>response.json())

.then(data=>{

alert(data.message);

window.location.href="otp.html";

})

.catch(error=>{

alert("Backend Connection Failed");

console.log(error);

})

}

</script>

</body>

</html>
