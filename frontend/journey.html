```html
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Journey Details</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(-45deg,#4f46e5,#7c3aed,#06b6d4,#9333ea);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
min-height:100vh;
padding:30px;
overflow-x:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:700px;
max-width:95%;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);
padding:30px;
margin:auto;
border-radius:25px;
box-shadow:0 8px 32px rgba(0,0,0,0.3);
color:white;
position:relative;
z-index:10;
}

h2{
text-align:center;
margin-bottom:20px;
font-size:34px;
color:white;
}

input,select{
width:100%;
padding:14px;
margin-top:12px;
border:none;
outline:none;
border-radius:12px;
font-size:16px;
background:rgba(255,255,255,0.2);
color:white;
}

input::placeholder{
color:#eee;
}

option{
color:black;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
}

.passenger-box{
border:1px solid rgba(255,255,255,0.3);
padding:15px;
margin-top:20px;
border-radius:15px;
background:rgba(255,255,255,0.1);
}

.particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
z-index:1;
}

.particles span{
position:absolute;
width:20px;
height:20px;
background:rgba(255,255,255,0.3);
border-radius:50%;
animation:float 15s linear infinite;
bottom:-150px;
}

.particles span:nth-child(1){left:10%;}
.particles span:nth-child(2){left:30%;}
.particles span:nth-child(3){left:50%;}
.particles span:nth-child(4){left:70%;}
.particles span:nth-child(5){left:90%;}

@keyframes float{
0%{
transform:translateY(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(-1200px) rotate(720deg);
opacity:0;
}
}

</style>

</head>

<body>

<div class="particles">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<div class="container">

<h2>Journey Details</h2>

<select id="from_place">

<option value="">Select From City</option>

<option>Hyderabad</option>
<option>Vijayawada</option>
<option>Visakhapatnam</option>
<option>Rajahmundry</option>
<option>Kakinada</option>
<option>Tirupati</option>
<option>Bengaluru</option>
<option>Chennai</option>

</select>

<select id="to_place">

<option value="">Select To City</option>

<option>Hyderabad</option>
<option>Vijayawada</option>
<option>Visakhapatnam</option>
<option>Rajahmundry</option>
<option>Kakinada</option>
<option>Tirupati</option>
<option>Bengaluru</option>
<option>Chennai</option>

</select>

<input
type="date"
id="journey_date"
>

<select id="bus_type">

<option value="">Select Bus Type</option>

<option>AC Sleeper</option>

<option>Non AC Sleeper</option>

<option>AC Seater</option>

<option>Non AC Seater</option>

</select>

<select id="travels_name">

<option value="">Select Travels</option>

<option>VRL Travels</option>

<option>Orange Travels</option>

<option>SRS Travels</option>

<option>Kaveri Travels</option>

<option>APSRTC Garuda</option>

<option>Morning Star Travels</option>

</select>

<input
type="number"
id="ticket_count"
placeholder="Number Of Tickets"
min="1"
max="6"
>

<button onclick="generatePassengers()">

Generate Passenger Forms

</button>

<div id="passengerForms"></div>

<button onclick="goToPricePage()">

Next

</button>

</div>

<script>

function generatePassengers(){

const count =
document.getElementById("ticket_count").value;

if(count=="" || count<=0){

alert("Enter Valid Ticket Count");

return;

}

let html = "";

for(let i=1;i<=count;i++){

html += `

<div class="passenger-box">

<h3>Passenger ${i}</h3>

<input
type="text"
id="name${i}"
placeholder="Passenger Name"
>

<input
type="number"
id="age${i}"
placeholder="Passenger Age"
>

<select id="gender${i}">

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

<select id="seat${i}" onchange="updateSeats()">

<option value="">Select Seat</option>

${generateSeats()}

</select>

</div>

`;

}

document.getElementById("passengerForms").innerHTML =
html;

}

function generateSeats(){

let seats = "";

const busType =
document.getElementById("bus_type").value;

if(
busType=="AC Sleeper" ||
busType=="Non AC Sleeper"
){

    for(let i=1;i<=16;i++){

        seats += `<option value="S${i}">S${i}</option>`;

    }

}
else if(
busType=="AC Seater" ||
busType=="Non AC Seater"
){

    for(let i=1;i<=20;i++){

        seats += `<option value="L${i}">L${i}</option>`;

    }

}

return seats;

}

let selectedSeats = [];

function updateSeats(){

selectedSeats = [];

const count =
document.getElementById("ticket_count").value;

for(let i=1;i<=count;i++){

    const seat =
    document.getElementById(`seat${i}`);

    if(seat && seat.value!=""){

        selectedSeats.push(seat.value);

    }

}

for(let i=1;i<=count;i++){

    const dropdown =
    document.getElementById(`seat${i}`);

    if(!dropdown) continue;

    const currentValue =
    dropdown.value;

    for(let j=0;j<dropdown.options.length;j++){

        const option =
        dropdown.options[j];

        option.disabled = false;

        if(
            selectedSeats.includes(option.value)
            &&
            option.value != currentValue
            &&
            option.value != ""
        ){

            option.disabled = true;

        }

    }

}

}

function goToPricePage(){

const from_place =
document.getElementById("from_place").value;

const to_place =
document.getElementById("to_place").value;

const journey_date =
document.getElementById("journey_date").value;

const bus_type =
document.getElementById("bus_type").value;

const travels_name =
document.getElementById("travels_name").value;

const ticket_count =
parseInt(
document.getElementById("ticket_count").value
);

if(
from_place=="" ||
to_place=="" ||
journey_date=="" ||
bus_type=="" ||
travels_name=="" ||
!ticket_count
){

alert("Please Fill All Journey Details");

return;

}

let passengers = [];

for(let i=1;i<=ticket_count;i++){

const passenger_name =
document.getElementById(`name${i}`).value;

const age =
document.getElementById(`age${i}`).value;

const gender =
document.getElementById(`gender${i}`).value;

const seat_number =
document.getElementById(`seat${i}`).value;

if(
passenger_name=="" ||
age=="" ||
gender=="" ||
seat_number==""
){

alert(`Please Fill Passenger ${i} Details`);

return;

}

passengers.push({

passenger_name:passenger_name,

age:age,

gender:gender,

seat_number:seat_number

});

}

let ticketPrice = 0;

if(bus_type=="AC Sleeper"){

ticketPrice = 1500;

}
else if(bus_type=="Non AC Sleeper"){

ticketPrice = 1200;

}
else if(bus_type=="AC Seater"){

ticketPrice = 1000;

}
else{

ticketPrice = 800;

}

const base_price =
ticket_count * ticketPrice;

const gst =
base_price * 0.18;

const state_tax = 100;

const toll_fee = 50;

const total_price =
base_price + gst + state_tax + toll_fee;

const journeyData = {

from_place:from_place,

to_place:to_place,

journey_date:journey_date,

bus_type:bus_type,

travels_name:travels_name,

ticket_count:ticket_count,

base_price:base_price,

gst:gst,

state_tax:state_tax,

toll_fee:toll_fee,

total_price:total_price,

passengers:passengers

};

localStorage.setItem(

"journeyData",

JSON.stringify(journeyData)

);

window.location.href="price.html";

}

</script>

</body>

</html>
