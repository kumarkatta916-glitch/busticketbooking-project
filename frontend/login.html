<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Login Page</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

.container{
width:400px;
background:white;
padding:20px;
margin:auto;
margin-top:80px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
color:blue;
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:1px solid gray;
border-radius:5px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:blue;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:darkblue;
}

</style>

</head>

<body>

<div class="container">

<h2>User Login</h2>

<input
type="text"
id="username"
placeholder="Enter Username"
>

<input
type="password"
id="password"
placeholder="Enter Password"
>

<button onclick="login()">

Login

</button>

</div>

<script>

function login(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

if(username=="" || password==""){

alert("Please Fill All Fields");

return;

}

fetch("http://localhost:5000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:username,

password:password

})

})

.then(response=>response.json())

.then(data=>{

if(data.status=="success"){

alert("Login Successful");

localStorage.setItem(
"username",
username
);

window.location.href="booking.html";

}
else{

alert("Invalid Username or Password");

}

})

.catch(error=>{

alert("Backend Connection Failed");

console.log(error);

})

}

</script>

</body>

</html>
